{% extends "base.html" %}

{% block content %}

<div class="card p-4 shadow-lg login-card" style="width: 400px;">
    <h3 class="text-center mb-3 login-header">Login</h3>

    <form method="POST" action='/login'>
        <div>
            <label class="form-label">Email</label>
            <input class="form-control mb-2" name="email" placeholder="Username">
        </div>
        <div>
            <label class="form-label">Password</label>
            <input type="password" class="form-control mb-2" name="password" placeholder="Password">
        </div>
        <div class="d-flex justify-content-center pt-4">
            <button class="btn btn-gradient">Login</button>
        </div>
    </form>

    <div class="text-start pt-3">
        <span>
            Don't have an account 
            <a href="/register" class="text-decoration-none link-gradient">Register</a>?
        </span>
    </div>
</div>

{% endblock %}
