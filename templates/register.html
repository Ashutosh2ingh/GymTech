{% extends "base.html" %}

{% block content %}

<div class="card p-4 shadow-lg register-card" style="width: 400px;">
    <h3 class="text-center mb-3 login-header">Register</h3>

    <form method="POST" action="/register">
        <div>
            <label class="form-label">Name</label>
            <input class="form-control mb-2" name="name" placeholder="Name">
        </div>
        <div>
            <label class="form-label">Email</label>
            <input class="form-control mb-2" name="email" placeholder="Email">
        </div>
        <div>
            <label class="form-label">Password</label>
            <input type="password" class="form-control mb-2" name="password" placeholder="Password">
        </div>
        <div class="d-flex justify-content-center pt-3">
            <button class="btn btn-gradient">Register</button>
        </div>
    </form>

    <div class="text-start pt-3">
        <span>
            Already have an account 
            <a href="/login" class="text-decoration-none link-gradient">Login</a>?
        </span>
    </div>
</div>

{% endblock %}
